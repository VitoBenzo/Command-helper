<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Command helper preview">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="36" y="28" width="1208" height="664" rx="16" fill="#0f172a" stroke="#334155"/>

  <rect x="36" y="28" width="1208" height="56" rx="16" fill="#111827"/>
  <circle cx="66" cy="56" r="8" fill="#ef4444"/>
  <circle cx="90" cy="56" r="8" fill="#f59e0b"/>
  <circle cx="114" cy="56" r="8" fill="#22c55e"/>
  <text x="148" y="62" font-family="JetBrains Mono, monospace" font-size="17" fill="#cbd5e1">dev.notes commands</text>

  <rect x="890" y="40" width="320" height="32" rx="8" fill="#020617" stroke="#334155"/>
  <text x="910" y="61" font-family="JetBrains Mono, monospace" font-size="14" fill="#64748b">Search commands...</text>

  <rect x="64" y="116" width="280" height="26" rx="13" fill="#1e293b"/>
  <text x="82" y="133" font-family="JetBrains Mono, monospace" font-size="12" fill="#a5b4fc">EN</text>
  <text x="116" y="133" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">DE</text>
  <text x="150" y="133" font-family="JetBrains Mono, monospace" font-size="12" fill="#94a3b8">RU</text>

  <rect x="64" y="168" width="1152" height="1" fill="#334155"/>

  <g transform="translate(64,190)">
    <rect width="1152" height="92" rx="10" fill="#0b1220" stroke="#1e293b"/>
    <rect x="18" y="18" width="72" height="20" rx="10" fill="url(#accent)"/>
    <text x="104" y="33" font-family="JetBrains Mono, monospace" font-size="16" fill="#e2e8f0">git basic push</text>
    <text x="18" y="66" font-family="JetBrains Mono, monospace" font-size="14" fill="#93c5fd">git add . && git commit -m "feat" && git push origin main</text>
  </g>

  <g transform="translate(64,298)">
    <rect width="1152" height="92" rx="10" fill="#0b1220" stroke="#1e293b"/>
    <rect x="18" y="18" width="88" height="20" rx="10" fill="#0ea5e9"/>
    <text x="120" y="33" font-family="JetBrains Mono, monospace" font-size="16" fill="#e2e8f0">python local http server</text>
    <text x="18" y="66" font-family="JetBrains Mono, monospace" font-size="14" fill="#93c5fd">python3 -m http.server 8080</text>
  </g>

  <g transform="translate(64,406)">
    <rect width="1152" height="92" rx="10" fill="#0b1220" stroke="#1e293b"/>
    <rect x="18" y="18" width="96" height="20" rx="10" fill="#22c55e"/>
    <text x="128" y="33" font-family="JetBrains Mono, monospace" font-size="16" fill="#e2e8f0">ffmpeg video to gif</text>
    <text x="18" y="66" font-family="JetBrains Mono, monospace" font-size="14" fill="#93c5fd">ffmpeg -i input.mp4 -vf "fps=15,scale=720:-1" output.gif</text>
  </g>

  <text x="64" y="646" font-family="JetBrains Mono, monospace" font-size="13" fill="#64748b">Preview mockup for README</text>
</svg>
