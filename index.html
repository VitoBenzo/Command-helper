<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Command Helper</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>⌨️ Command Helper</h1>
    <p class="subtitle">A quick reference for common terminal commands</p>
    <div class="search-wrapper">
      <input
        type="search"
        id="search"
        placeholder="Search commands…"
        autofocus
        autocomplete="off"
        spellcheck="false"
      />
      <span id="count"></span>
    </div>
  </header>

  <main id="command-list" role="list" aria-label="Command list">
    <p class="loading">Loading commands…</p>
  </main>

  <footer>
    <p>Data sourced from <code>commands.json</code> · No backend · No frameworks</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
