<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-label="dev.notes commands banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#061025"/>
      <stop offset="55%" stop-color="#0a1f3f"/>
      <stop offset="100%" stop-color="#0b2c3d"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#1e3a5f" stroke-width="1" opacity="0.35"/>
    </pattern>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#grid)"/>

  <circle cx="1120" cy="50" r="140" fill="#0ea5e9" opacity="0.22" filter="url(#soft)"/>
  <circle cx="170" cy="320" r="120" fill="#14b8a6" opacity="0.18" filter="url(#soft)"/>

  <rect x="72" y="74" width="176" height="34" rx="17" fill="#0b1220" stroke="#334155"/>
  <circle cx="94" cy="91" r="6" fill="#22c55e"/>
  <text x="110" y="97" font-family="JetBrains Mono, monospace" font-size="14" fill="#93c5fd">multilingual</text>

  <text x="72" y="172" font-family="Syne, Arial, sans-serif" font-size="62" font-weight="800" fill="#e2e8f0">dev.notes commands</text>
  <rect x="72" y="188" width="640" height="4" rx="2" fill="url(#glow)"/>
  <text x="72" y="236" font-family="JetBrains Mono, monospace" font-size="20" fill="#93c5fd">Fast CLI cheat sheet for EN, DE, and RU workflows</text>

  <g transform="translate(72,270)">
    <rect width="148" height="42" rx="10" fill="#0b1220" stroke="#1d4ed8"/>
    <text x="22" y="27" font-family="JetBrains Mono, monospace" font-size="16" fill="#bfdbfe">search</text>
    <rect x="164" width="148" height="42" rx="10" fill="#0b1220" stroke="#0891b2"/>
    <text x="186" y="27" font-family="JetBrains Mono, monospace" font-size="16" fill="#a5f3fc">filter</text>
    <rect x="328" width="148" height="42" rx="10" fill="#0b1220" stroke="#0f766e"/>
    <text x="350" y="27" font-family="JetBrains Mono, monospace" font-size="16" fill="#99f6e4">copy</text>
  </g>
</svg>
